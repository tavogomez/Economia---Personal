<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Planificador</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6c63ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planificador">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}

/* HEADER */
.header{background:#6c63ff;color:white;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(108,99,255,.35);gap:10px}
.header h1{font-size:.95rem;font-weight:700;flex-shrink:0}
.header-right{display:flex;align-items:center;gap:8px}
.tabs{display:flex;gap:4px;overflow-x:auto}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:5px 11px;border:none;border-radius:16px;cursor:pointer;font-size:.75rem;font-weight:500;background:rgba(255,255,255,.18);color:white;white-space:nowrap;transition:all .18s;flex-shrink:0}
.tab:hover{background:rgba(255,255,255,.3)}
.tab.active{background:white;color:#6c63ff;font-weight:700}
.sync-wrap{display:flex;align-items:center;gap:5px;cursor:pointer;padding:4px 8px;border-radius:12px;background:rgba(255,255,255,.15);flex-shrink:0;transition:background .18s}
.sync-wrap:hover{background:rgba(255,255,255,.25)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#9ca3af;transition:background .3s}
.sync-label{font-size:.65rem;color:rgba(255,255,255,.85);white-space:nowrap}

/* NAV BAR */
.nav-bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 16px;background:white;border-bottom:1px solid #e8e8e8}
.nav-btn{background:none;border:1.5px solid #ddd;border-radius:8px;padding:5px 14px;cursor:pointer;color:#555;font-size:1rem;transition:all .18s}
.nav-btn:hover{background:#6c63ff;color:white;border-color:#6c63ff}
.nav-title{font-size:.9rem;font-weight:600;min-width:200px;text-align:center;text-transform:capitalize}
.today-btn{padding:5px 14px;border:1.5px solid #6c63ff;border-radius:8px;background:none;color:#6c63ff;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .18s}
.today-btn:hover{background:#6c63ff;color:white}

.container{max-width:980px;margin:0 auto;padding:20px 16px}

/* MONTH */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.dh{text-align:center;font-size:.65rem;font-weight:700;color:#aaa;padding:6px 0 4px;text-transform:uppercase;letter-spacing:.5px}
.dc{background:white;border-radius:10px;padding:7px;min-height:78px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.dc:hover{border-color:#6c63ff}
.dc.m-today{background:#f5f3ff;border-color:#6c63ff}
.dc.m-other{opacity:.3;pointer-events:none}
.dc.m-sel{box-shadow:0 0 0 3px rgba(108,99,255,.25);border-color:#6c63ff}
.dc-num{font-size:.78rem;font-weight:700;color:#444;margin-bottom:3px}
.dc.m-today .dc-num{color:#6c63ff}
.dc-items{display:flex;flex-direction:column;gap:2px}
.dc-item{font-size:.58rem;border-radius:3px;padding:1px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:#eeecff;color:#6c63ff}
.dc-item.cat-cumple{background:#fef3c7;color:#92400e}
.dc-item.cat-medico{background:#dcfce7;color:#166534}
.dc-item.cat-torneo{background:#fee2e2;color:#991b1b}
.dc-item.cat-viaje{background:#dbeafe;color:#1e40af}
.dc-item.cat-evento{background:#ede9fe;color:#5b21b6}
.dc-item.dc-more{background:none;color:#9ca3af}

/* WEEK */
.week-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.week-grid{display:grid;grid-template-columns:repeat(7,minmax(110px,1fr));gap:8px;min-width:760px}
.wc{background:white;border-radius:14px;padding:12px 10px;border:2px solid transparent}
.wc.wc-today{border-color:#6c63ff;background:#fbfaff}
.wc-head{text-align:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f0f0f0;cursor:pointer}
.wc-head:hover .wc-num{color:#6c63ff}
.wc-name{font-size:.65rem;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px}
.wc-num{font-size:1.4rem;font-weight:800;color:#1a1a2e;line-height:1.2;transition:color .15s}
.wc.wc-today .wc-num{color:#6c63ff}
.act-list{display:flex;flex-direction:column;gap:5px}
.ai{display:flex;align-items:flex-start;gap:6px;padding:5px 7px;border-radius:7px;background:#f7f8fc;transition:background .15s}
.ai:hover{background:#eeecff}
.ai.ai-done{opacity:.5}
.ai-check{flex-shrink:0;width:16px;height:16px;border-radius:50%;border:2px solid #ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;font-size:9px;color:white;font-weight:bold;user-select:none;transition:all .15s}
.ai-check.ck{background:#22c55e;border-color:#22c55e}
.ai-body{flex:1;min-width:0}
.ai-text{font-size:.74rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#333}
.ai.ai-done .ai-text{text-decoration:line-through;color:#bbb}
.ai-time{font-size:.62rem;color:#bbb;margin-top:1px}
.ai-sub-count{font-size:.6rem;color:#9ca3af;margin-top:1px}
.ai-del{flex-shrink:0;background:none;border:none;cursor:pointer;color:#ddd;font-size:.7rem;padding:1px 2px;opacity:0;transition:opacity .15s,color .15s}
.ai:hover .ai-del{opacity:1}
.ai-del:hover{color:#ef4444}
.wk-add-btn{margin-top:8px;width:100%;padding:6px;border:1.5px dashed #ddd;background:none;border-radius:7px;cursor:pointer;color:#bbb;font-size:.72rem;transition:all .15s}
.wk-add-btn:hover{border-color:#6c63ff;color:#6c63ff}

/* DAY VIEW */
.day-wrap{max-width:600px;margin:0 auto}
.day-header-card{background:white;border-radius:16px;padding:20px 24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.dv-title{font-size:1.25rem;font-weight:800;text-transform:capitalize}
.dv-sub{color:#aaa;font-size:.8rem;margin-top:3px}
.prog-label{font-size:.73rem;color:#888;margin-top:14px;margin-bottom:5px}
.prog-bar{background:#f0f2f5;border-radius:4px;height:6px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#6c63ff,#22c55e);border-radius:4px;transition:width .4s}
.day-act-card{background:white;border-radius:12px;padding:14px 16px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.04);transition:all .15s}
.day-act-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.day-act-card.d-done{opacity:.55}
.dac-top{display:flex;align-items:center;gap:10px}
.d-check{flex-shrink:0;width:24px;height:24px;border-radius:50%;border:2.5px solid #ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;color:white;transition:all .18s;user-select:none}
.d-check.ck{background:#22c55e;border-color:#22c55e}
.dac-body{flex:1}
.d-text{font-size:.9rem;font-weight:600;color:#222}
.day-act-card.d-done .d-text{text-decoration:line-through;color:#bbb}
.d-times{font-size:.73rem;color:#9ca3af;margin-top:2px}
.dac-btns{display:flex;gap:5px}
.dac-btn{background:none;border:1px solid #e5e7eb;border-radius:6px;cursor:pointer;font-size:.7rem;padding:3px 7px;color:#888;transition:all .15s}
.dac-btn:hover{border-color:#6c63ff;color:#6c63ff}
.dac-btn.del:hover{border-color:#ef4444;color:#ef4444}
.dac-notes{font-size:.78rem;color:#888;font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0}
.subacts{margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0}
.subact-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.8rem;color:#555}
.subact-check{width:14px;height:14px;border-radius:3px;border:2px solid #ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:8px;color:white;font-weight:bold;flex-shrink:0;transition:all .15s;user-select:none}
.subact-check.ck{background:#22c55e;border-color:#22c55e}
.subact-text.done{text-decoration:line-through;color:#bbb}
.day-add-btn{width:100%;padding:12px;background:white;border:2px dashed #ddd;border-radius:12px;cursor:pointer;color:#bbb;font-size:.85rem;transition:all .18s;margin-top:4px}
.day-add-btn:hover{border-color:#6c63ff;color:#6c63ff}

/* OBJECTIVES */
.obj-wrap{max-width:680px;margin:0 auto}
.obj-month-header{font-size:1.1rem;font-weight:800;text-transform:capitalize;margin-bottom:16px}
.obj-card{background:white;border-radius:14px;padding:18px 20px;margin-bottom:12px;box-shadow:0 2px 10px rgba(0,0,0,.05);border-left:4px solid #6c63ff}
.obj-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.obj-title{font-size:.95rem;font-weight:700;color:#1a1a2e}
.obj-del{background:none;border:none;cursor:pointer;color:#ddd;font-size:.85rem;padding:4px}
.obj-del:hover{color:#ef4444}
.stage-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:#f7f8fc;margin-bottom:6px;border-left:3px solid #e5e7eb}
.stage-item.s-done{opacity:.55;border-left-color:#22c55e}
.stage-check{width:18px;height:18px;border-radius:4px;border:2px solid #ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:white;font-weight:bold;flex-shrink:0;transition:all .15s;user-select:none}
.stage-check.ck{background:#22c55e;border-color:#22c55e}
.stage-body{flex:1}
.stage-text{font-size:.83rem;font-weight:500}
.stage-item.s-done .stage-text{text-decoration:line-through;color:#bbb}
.stage-week{font-size:.68rem;color:#9ca3af;margin-top:2px}
.stage-del{background:none;border:none;cursor:pointer;color:#ddd;font-size:.72rem;opacity:0;padding:2px}
.stage-item:hover .stage-del{opacity:1}
.stage-del:hover{color:#ef4444}
.obj-add-stage{width:100%;margin-top:8px;padding:6px;border:1.5px dashed #ddd;background:none;border-radius:8px;cursor:pointer;color:#bbb;font-size:.73rem;transition:all .15s}
.obj-add-stage:hover{border-color:#6c63ff;color:#6c63ff}
.obj-add-new{width:100%;padding:14px;background:white;border:2px dashed #ddd;border-radius:14px;cursor:pointer;color:#bbb;font-size:.88rem;transition:all .18s}
.obj-add-new:hover{border-color:#6c63ff;color:#6c63ff}
.inline-form{display:flex;gap:8px;margin-top:8px}
.inline-input{flex:1;padding:7px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:.82rem;font-family:inherit;outline:none}
.inline-input:focus{border-color:#6c63ff}
.inline-ok{padding:7px 12px;background:#6c63ff;color:white;border:none;border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600}
.inline-sel{padding:7px 8px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:.78rem;font-family:inherit;outline:none;background:white}
.inline-sel:focus{border-color:#6c63ff}

/* EVALUATION */
.eval-wrap{max-width:680px;margin:0 auto}
.eval-period-tabs{display:flex;gap:8px;margin-bottom:20px}
.eval-tab{padding:7px 18px;border:1.5px solid #ddd;border-radius:20px;cursor:pointer;background:none;color:#888;font-size:.83rem;transition:all .18s}
.eval-tab.active{background:#6c63ff;border-color:#6c63ff;color:white;font-weight:600}
.eval-card{background:white;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.eval-card h3{font-size:.95rem;font-weight:700;margin-bottom:16px;text-transform:capitalize}
.stat-row{display:flex;gap:12px;margin-bottom:16px}
.stat-box{flex:1;padding:14px;border-radius:12px;text-align:center}
.stat-box.planned{background:#f5f3ff}
.stat-box.done-box{background:#f0fdf4}
.stat-box.missed{background:#fef2f2}
.stat-num{font-size:1.8rem;font-weight:800}
.stat-box.planned .stat-num{color:#6c63ff}
.stat-box.done-box .stat-num{color:#22c55e}
.stat-box.missed .stat-num{color:#ef4444}
.stat-label{font-size:.7rem;color:#888;margin-top:4px}
.eval-bar{height:8px;border-radius:4px;background:#f0f2f5;overflow:hidden;margin-bottom:16px;display:flex}
.eval-bar-done{background:#22c55e;transition:width .4s}
.eval-bar-miss{background:#ef4444;transition:width .4s}
.eval-notes-lbl{font-size:.76rem;color:#888;margin-bottom:6px}
.eval-notes{width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:12px;font-size:.87rem;font-family:inherit;resize:vertical;min-height:80px;outline:none;color:#333}
.eval-notes:focus{border-color:#6c63ff}
.eval-save{margin-top:10px;padding:8px 20px;background:#6c63ff;color:white;border:none;border-radius:8px;cursor:pointer;font-size:.83rem;font-weight:600}
.eval-save:hover{background:#574fd6}

/* MODAL OVERLAY */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:white;border-radius:18px;padding:22px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.modal h2{font-size:1rem;font-weight:800;margin-bottom:16px}
.field-group{margin-bottom:13px}
.field-label{font-size:.73rem;font-weight:600;color:#666;margin-bottom:5px;display:block;cursor:help}
.modal-input{width:100%;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:9px;font-size:.88rem;outline:none;font-family:inherit}
.modal-input:focus{border-color:#6c63ff}
.modal-textarea{width:100%;padding:9px 12px;border:1.5px solid #e5e7eb;border-radius:9px;font-size:.85rem;font-family:inherit;resize:vertical;min-height:65px;outline:none}
.modal-textarea:focus{border-color:#6c63ff}

/* CATEGORY PILLS */
.cat-pills{display:flex;flex-wrap:wrap;gap:6px}
.cat-pill{padding:5px 10px;border-radius:16px;border:1.5px solid #e5e7eb;background:none;cursor:pointer;font-size:.73rem;color:#888;transition:all .15s}
.cat-pill[data-cat="normal"].active{background:#6c63ff;border-color:#6c63ff;color:white;font-weight:600}
.cat-pill[data-cat="cumple"].active{background:#f59e0b;border-color:#f59e0b;color:white;font-weight:600}
.cat-pill[data-cat="medico"].active{background:#22c55e;border-color:#22c55e;color:white;font-weight:600}
.cat-pill[data-cat="torneo"].active{background:#ef4444;border-color:#ef4444;color:white;font-weight:600}
.cat-pill[data-cat="viaje"].active{background:#3b82f6;border-color:#3b82f6;color:white;font-weight:600}
.cat-pill[data-cat="evento"].active{background:#8b5cf6;border-color:#8b5cf6;color:white;font-weight:600}

/* TIME ROW */
.time-row{display:flex;gap:12px}
.time-field{flex:1}
.time-field label{font-size:.7rem;color:#888;display:block;margin-bottom:4px}

/* SUBACTS MODAL */
.subacts-modal{display:flex;flex-direction:column;gap:6px;margin-bottom:6px}
.subact-row{display:flex;align-items:center;gap:7px}
.subact-inp{flex:1;padding:6px 9px;border:1.5px solid #e5e7eb;border-radius:7px;font-size:.8rem;outline:none;font-family:inherit}
.subact-inp:focus{border-color:#6c63ff}
.subact-rm{background:none;border:none;cursor:pointer;color:#ddd;font-size:.85rem;padding:2px}
.subact-rm:hover{color:#ef4444}
.add-subact-btn{width:100%;padding:6px;border:1.5px dashed #ddd;background:none;border-radius:7px;cursor:pointer;color:#bbb;font-size:.73rem;transition:all .15s}
.add-subact-btn:hover{border-color:#6c63ff;color:#6c63ff}

/* REPEAT SECTION */
.repeat-section{background:#f8f9fc;border-radius:10px;padding:12px;margin-bottom:13px}
.toggle-row{display:flex;align-items:center;gap:8px;cursor:pointer}
.toggle-row input[type="checkbox"]{width:16px;height:16px;cursor:pointer;accent-color:#6c63ff}
.toggle-row span{font-size:.82rem;font-weight:600;color:#555}
.repeat-hint{font-size:.68rem;color:#9ca3af;font-style:italic;margin-top:3px;margin-left:24px}
.day-pills-wrap{margin-top:10px;display:flex;gap:5px;flex-wrap:wrap}
.day-pill-m{padding:4px 10px;border:1.5px solid #ddd;border-radius:14px;background:none;cursor:pointer;font-size:.7rem;color:#888;transition:all .15s}
.day-pill-m.active{background:#6c63ff;border-color:#6c63ff;color:white;font-weight:600}

.modal-btns{display:flex;gap:8px;margin-top:14px}
.modal-ok{flex:1;padding:10px;background:#6c63ff;color:white;border:none;border-radius:9px;cursor:pointer;font-size:.88rem;font-weight:700}
.modal-ok:hover{background:#574fd6}
.modal-cancel{padding:10px 16px;background:none;border:1.5px solid #e5e7eb;border-radius:9px;cursor:pointer;font-size:.88rem;color:#888}

/* ID MODAL */
.id-box{display:flex;gap:8px;align-items:center;background:#f0f2f5;border-radius:10px;padding:10px 14px;margin-bottom:18px}
.id-code{flex:1;font-family:monospace;font-size:.75rem;color:#444;word-break:break-all}
.copy-btn{flex-shrink:0;padding:6px 12px;background:#6c63ff;color:white;border:none;border-radius:8px;cursor:pointer;font-size:.76rem;font-weight:600}
.copy-btn:hover{background:#574fd6}
.copy-btn.copied{background:#22c55e}
.modal hr{border:none;border-top:1px solid #f0f0f0;margin:18px 0}
.modal p{font-size:.83rem;color:#666;line-height:1.5;margin-bottom:14px}
.modal label{font-size:.8rem;font-weight:600;color:#555;display:block;margin-bottom:7px}

/* MISC */
.empty{text-align:center;padding:36px 20px;color:#ccc}
.empty-icon{font-size:2.5rem;margin-bottom:8px}
.empty-text{font-size:.88rem}
.local-banner{background:#fef3c7;border-bottom:1px solid #fcd34d;padding:7px 16px;font-size:.76rem;color:#92400e;display:flex;align-items:center;justify-content:center;gap:8px}
.local-banner a{color:#6c63ff;font-weight:700;text-decoration:none}

/* WEEK STAGES PANEL */
.week-stages-panel{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:14px;padding:14px 16px;margin-bottom:14px}
.wsp-title{font-size:.72rem;font-weight:800;color:#d97706;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.wsp-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;background:white;margin-bottom:6px;border-left:3px solid #f59e0b;transition:opacity .2s}
.wsp-item:last-child{margin-bottom:0}
.wsp-item.wsp-done{opacity:.5}
.wsp-dot{width:8px;height:8px;border-radius:50%;background:#f59e0b;flex-shrink:0}
.wsp-body{flex:1;min-width:0}
.wsp-text{font-size:.82rem;font-weight:600;color:#78350f;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wsp-item.wsp-done .wsp-text{text-decoration:line-through;color:#bbb}
.wsp-obj{font-size:.65rem;color:#b45309;font-style:italic;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wsp-assign-btn{padding:4px 10px;background:none;border:1.5px solid #f59e0b;border-radius:14px;cursor:pointer;color:#d97706;font-size:.67rem;font-weight:600;white-space:nowrap;transition:all .15s;flex-shrink:0}
.wsp-assign-btn:hover{background:#f59e0b;color:white}
.wsp-day-tag{padding:4px 10px;background:#fef3c7;border-radius:14px;font-size:.67rem;font-weight:600;color:#d97706;cursor:pointer;white-space:nowrap;flex-shrink:0;border:1.5px solid #fcd34d;transition:all .15s}
.wsp-day-tag:hover{background:#f59e0b;color:white}

/* DAY STAGE CARDS */
.day-stage-card{background:#fffbeb;border:2px solid #fcd34d;border-left:4px solid #f59e0b;border-radius:12px;padding:14px 16px;margin-bottom:8px}
.day-stage-card.dst-done{opacity:.55}
.dst-label{font-size:.62rem;font-weight:800;color:#f59e0b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.dst-obj{font-size:.72rem;color:#b45309;font-style:italic;margin-bottom:4px}
.dst-text{font-size:.9rem;font-weight:600;color:#78350f}

/* ASSIGN DAY POPUP */
.assign-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.assign-popup{background:white;border-radius:16px;padding:20px;width:100%;max-width:290px;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.assign-popup h3{font-size:.9rem;font-weight:700;margin-bottom:14px;color:#1a1a2e}
.assign-day-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}

<div id="act-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeActModal()">

// ═══════════════════════════════════════════
//  PERSISTENCIA

function saveLocal() {
  localStorage.setItem('planificador_v2', JSON.stringify({ data:st.data, objectives:st.objectives, evaluations:st.evaluations, gastos:st.gastos||[], fijos:st.fijos||{} }));
}
function loadLocal() {
  try {
    const r = JSON.parse(localStorage.getItem('planificador_v2') || localStorage.getItem('planificador_v1') || '{}');
    st.data = r.data||{}; st.objectives = r.objectives||{}; st.evaluations = r.evaluations||{}; st.gastos = r.gastos||[]; st.fijos = r.fijos||{};
  } catch { st.data={}; st.objectives={}; st.evaluations={}; st.gastos=[]; st.fijos={}; }
}
function saveFirestore() {
  if (!db) return;
  setSync('guardando');
  db.collection('planificadores').doc(userId).set({ data:st.data, objectives:st.objectives, evaluations:st.evaluations, gastos:st.gastos||[], fijos:st.fijos||{} })
    .then(()=>setSync('sincronizado')).catch(()=>setSync('error'));
}
function loadFirestore(cb) {
  if (!db) { cb&&cb(); return; }
  setSync('guardando');
  db.collection('planificadores').doc(userId).get()
    .then(snap => {
      if (snap.exists) { const d=snap.data(); st.data=d.data||{}; st.objectives=d.objectives||{}; st.evaluations=d.evaluations||{}; st.gastos=d.gastos||[]; st.fijos=d.fijos||{}; saveLocal(); }
      setSync('sincronizado'); cb&&cb();
    }).catch(()=>{ setSync('error'); cb&&cb(); });
}
function save() { saveLocal(); saveFirestore(); }

// ═══════════════════════════════════════════
//  HELPERS DE FECHA
// ═══════════════════════════════════════════
function dk(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function ymk(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function fromKey(k) { return new Date(k+'T12:00:00'); }
function addDays(d,n) { const c=new Date(d); c.setDate(c.getDate()+n); return c; }
function monOfWeek(d) { const c=new Date(d); c.setHours(12,0,0,0); const diff=(c.getDay()===0)?-6:1-c.getDay(); c.setDate(c.getDate()+diff); return c; }
function isToday(d) { return dk(d)===dk(new Date()); }
function diIdx(d) { return (d.getDay()+6)%7; }
function weekNumOfMonth(d) {
  const mon=monOfWeek(d);
  const dayInMonth=mon.getMonth()===d.getMonth()?mon.getDate():1;
  return Math.min(4,Math.ceil(dayInMonth/7));
}
function dayLabelShort(key) {
  if(!key) return '';
  const d=fromKey(key);
  return `${DIA_CORTO[diIdx(d)]} ${d.getDate()}`;
}

// ═══════════════════════════════════════════
//  ACTIVITY CRUD
// ═══════════════════════════════════════════
function acts(d) { return st.data[dk(d)]||[]; }
function sortedActs(d) {
  return [...acts(d)].sort((a,b)=>{
    if (!a.timeStart&&!b.timeStart) return 0;
    if (!a.timeStart) return 1;
    if (!b.timeStart) return -1;
    return a.timeStart.localeCompare(b.timeStart);
  });
}
function setActs(d,arr) { if(arr.length===0) delete st.data[dk(d)]; else st.data[dk(d)]=arr; save(); }
function addAct(d,act) { const arr=acts(d); arr.push({id:uid(),done:false,subacts:[],...act}); setActs(d,arr); }
function toggleAct(d,id) { setActs(d,acts(d).map(a=>a.id===id?{...a,done:!a.done,skipped:false,skipReason:''}:a)); }
function markSkipped(d,id,reason) { setActs(d,acts(d).map(a=>a.id===id?{...a,done:false,skipped:true,skipReason:reason}:a)); }
function markPending(d,id) { setActs(d,acts(d).map(a=>a.id===id?{...a,done:false,skipped:false,skipReason:''}:a)); }
function toggleSubAct(d,actId,subId) {
  setActs(d,acts(d).map(a=>a.id===actId?{...a,subacts:(a.subacts||[]).map(s=>s.id===subId?{...s,done:!s.done}:s)}:a));
}
function delAct(d,id) { setActs(d,acts(d).filter(a=>a.id!==id)); }

// ═══════════════════════════════════════════
//  ACTIVIDADES RECURRENTES (carga masiva)
// ═══════════════════════════════════════════
function addRecurring(dateKey, actData, days) {
  const ref = fromKey(dateKey);
  const year = ref.getFullYear(), month = ref.getMonth();
  const daysInMonth = new Date(year,month+1,0).getDate();
  const changes = {};
  for (let day=1; day<=daysInMonth; day++) {
    const d = new Date(year,month,day);
    if (days.has(diIdx(d))) {
      const k = dk(d);
      if (!changes[k]) changes[k] = [...acts(d)];
      changes[k].push({id:uid(),done:false,subacts:[],...actData});
    }
  }
  Object.entries(changes).forEach(([k,arr])=>{ if(arr.length===0) delete st.data[k]; else st.data[k]=arr; });
  save();
}

// ═══════════════════════════════════════════
//  OBJECTIVES CRUD
// ═══════════════════════════════════════════
function getObjs(d) { return st.objectives[ymk(d)]||[]; }
function setObjs(d,arr) { if(arr.length===0) delete st.objectives[ymk(d)]; else st.objectives[ymk(d)]=arr; save(); }
function addObj(d,text) { const arr=getObjs(d); arr.push({id:uid(),text,stages:[]}); setObjs(d,arr); }
function addStage(d,objId,text,week) {
  setObjs(d,getObjs(d).map(o=>o.id===objId?{...o,stages:[...(o.stages||[]),{id:uid(),text,week,done:false}]}:o));
}
function toggleStage(d,objId,stageId) {
  setObjs(d,getObjs(d).map(o=>o.id===objId?{...o,stages:(o.stages||[]).map(s=>s.id===stageId?{...s,done:!s.done}:s)}:o));
}
function delObj(d,objId) { setObjs(d,getObjs(d).filter(o=>o.id!==objId)); }
function delStage(d,objId,stageId) {
  setObjs(d,getObjs(d).map(o=>o.id===objId?{...o,stages:(o.stages||[]).filter(s=>s.id!==stageId)}:o));
}
function assignDayToStage(d,objId,stageId,dayKey,timeStart) {
  setObjs(d,getObjs(d).map(o=>
    o.id===objId?{...o,stages:(o.stages||[]).map(s=>
      s.id===stageId?{...s,dayKey:dayKey||'',timeStart:timeStart||''}:s
    )}:o
  ));
}

// ═══════════════════════════════════════════
//  EVALUACIÓN
// ═══════════════════════════════════════════
function evalKey() {
  const d=st.date;
  if (st.evalPeriod==='day') return 'day-'+dk(d);
  if (st.evalPeriod==='week') return 'week-'+dk(monOfWeek(d));
  return 'month-'+ymk(d);
}
function getEvalNotes(k) { return (st.evaluations[k]||{}).notes||''; }
function setEvalNotes(k,notes) { st.evaluations[k]={notes}; save(); }
function evalStats() {
  let keys=[];
  const d=st.date;
  if (st.evalPeriod==='day') {
    keys=[dk(d)];
  } else if (st.evalPeriod==='week') {
    const mon=monOfWeek(d);
    for(let i=0;i<7;i++) keys.push(dk(addDays(mon,i)));
  } else {
    const days=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    for(let i=1;i<=days;i++) keys.push(dk(new Date(d.getFullYear(),d.getMonth(),i)));
  }
  let total=0,done=0,missed=0;
  keys.forEach(k=>{ const aa=st.data[k]||[]; total+=aa.length; done+=aa.filter(a=>a.done).length; missed+=aa.filter(a=>a.skipped).length; });
  return {total,done,missed,pending:total-done-missed,pct:total>0?Math.round(done/total*100):0};
}

function nav(dir) {
  if (['month','objectives','evaluation','gastos'].includes(st.view)) {
    st.date = new Date(st.date.getFullYear(),st.date.getMonth()+dir,1);
  } else if (st.view==='week') {
    st.date = addDays(st.date,dir*7);
  } else {
    st.date = addDays(st.date,dir);
  }
  render();
}
function goToday() { st.date=new Date(); render(); }
function setView(v) { st.view=v; render(); }

// ═══════════════════════════════════════════
//  RENDER PRINCIPAL
// ═══════════════════════════════════════════
function render() {
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===st.view));
  let title='', html='';
  if (st.view==='month') {
    title=`${MESES[st.date.getMonth()]} ${st.date.getFullYear()}`;
    html=renderMonth();
  } else if (st.view==='week') {
    const mon=monOfWeek(st.date), sun=addDays(mon,6);
    title=mon.getMonth()===sun.getMonth()
      ?`${MESES[mon.getMonth()]} ${mon.getFullYear()}`
      :`${mon.getDate()} ${MESES[mon.getMonth()].slice(0,3)} – ${sun.getDate()} ${MESES[sun.getMonth()].slice(0,3)} ${sun.getFullYear()}`;
    html=renderWeek();
  } else if (st.view==='day') {
    title=`${DIA_LARGO[diIdx(st.date)]}, ${st.date.getDate()} de ${MESES[st.date.getMonth()]}`;
    html=renderDay();
  } else if (st.view==='objectives') {
    title=`Objetivos – ${MESES[st.date.getMonth()]} ${st.date.getFullYear()}`;
    html=renderObjectives();
  } else if (st.view==='evaluation') {
    title=`Evaluación – ${MESES[st.date.getMonth()]} ${st.date.getFullYear()}`;
    html=renderEvaluation();
  } else if (st.view==='gastos') {
    title=`Gastos – ${MESES[st.date.getMonth()]} ${st.date.getFullYear()}`;
    html=renderGastos();
  }
  document.getElementById('nav-title').textContent=title;
  document.getElementById('main').innerHTML=html;
}

// ═══════════════════════════════════════════
//  RENDER MES
// ═══════════════════════════════════════════
function renderMonth() {
  const year=st.date.getFullYear(), month=st.date.getMonth();
  const first=new Date(year,month,1);
  const startOffset=(first.getDay()+6)%7;
  const cur=addDays(first,-startOffset);
  let html='<div class="container"><div class="month-grid">';
  DIA_CORTO.forEach(d=>{ html+=`<div class="dh">${d}</div>`; });
  for (let i=0;i<42;i++) {
    const key=dk(cur), aa=acts(cur);
    const other=cur.getMonth()!==month, tod=isToday(cur), sel=dk(cur)===dk(st.date);
    let cls='dc'; if(other)cls+=' m-other'; if(tod)cls+=' m-today'; if(sel&&!other)cls+=' m-sel';
    const items=aa.slice(0,3).map(a=>{
      const cat=a.category||'normal', emoji=CATS[cat]?.emoji||'';
      return `<div class="dc-item cat-${cat}">${emoji?emoji+' ':''}${esc(a.text)}</div>`;
    }).join('');
    const more=aa.length>3?`<div class="dc-item dc-more">+${aa.length-3} más</div>`:'';
    const click=other?'':`onclick="clickDay('${key}')"`;
    html+=`<div class="${cls}" ${click}><div class="dc-num">${cur.getDate()}</div><div class="dc-items">${items}${more}</div></div>`;
    cur.setDate(cur.getDate()+1);
  }
  return html+'</div></div>';
}

// ═══════════════════════════════════════════
//  RENDER SEMANA
// ═══════════════════════════════════════════
function renderWeek() {
  const mon=monOfWeek(st.date);
  const weekNum=weekNumOfMonth(st.date);
  const objs=getObjs(mon);
  const ym=ymk(mon);
  const weekStages=[];
  objs.forEach(obj=>{
    (obj.stages||[]).forEach(s=>{ if(String(s.week)===String(weekNum)) weekStages.push({...s,objText:obj.text,objId:obj.id}); });
  });
  let stagesHtml='';
  if(weekStages.length>0){
    stagesHtml=`<div class="week-stages-panel">
      <div class="wsp-title">&#127919; Prioridades &middot; Semana ${weekNum}</div>
      ${weekStages.map(s=>{
        const dayTag=s.dayKey
          ?`<span class="wsp-day-tag" onclick="assignStageDay('${ym}','${s.objId}','${s.id}')">&#128197; ${dayLabelShort(s.dayKey)}${s.timeStart?' · '+s.timeStart:''}</span>`
          :`<button class="wsp-assign-btn" onclick="assignStageDay('${ym}','${s.objId}','${s.id}')">+ Asignar d&iacute;a</button>`;
        return `<div class="wsp-item ${s.done?'wsp-done':''}">
          <div class="wsp-dot"></div>
          <div class="wsp-body">
            <div class="wsp-text">${esc(s.text)}</div>
            <div class="wsp-obj">&#128204; ${esc(s.objText)}</div>
          </div>
          ${dayTag}
        </div>`;
      }).join('')}
    </div>`;
  }
  let html=`<div class="container">${stagesHtml}<div class="week-scroll"><div class="week-grid">`;
  for (let i=0;i<7;i++) {
    const day=addDays(mon,i), key=dk(day), aa=sortedActs(day), tod=isToday(day);
    const actsHtml=aa.map(a=>{
      const cat=a.category||'normal', emoji=CATS[cat]?.emoji||'';
      const subs=(a.subacts||[]).length;
      const wkCls=a.done?'ai-done':a.skipped?'ai-skip':'';
      const wkCheck=a.skipped
        ?`<div class="ai-skip-x" onclick="event.stopPropagation();toggle('${key}','${a.id}')" title="Quitar incumplimiento">&#10007;</div>`
        :`<div class="ai-check ${a.done?'ck':''}" onclick="event.stopPropagation();toggle('${key}','${a.id}')">${a.done?'&#10003;':''}</div>`;
      return `<div class="ai ${wkCls}" onclick="clickDay('${key}')">
        ${wkCheck}
        <div class="ai-body">
          <div class="ai-text">${emoji?`${emoji} `:''}${esc(a.text)}</div>
          ${a.timeStart?`<div class="ai-time">${a.timeStart}${a.timeEnd?' – '+a.timeEnd:''}</div>`:''}
          ${subs>0?`<div class="ai-sub-count">${subs} subtarea${subs>1?'s':''}</div>`:''}
        </div>
        <button class="ai-del" onclick="event.stopPropagation();del('${key}','${a.id}')">&#10005;</button>
      </div>`;
    }).join('');
    html+=`<div class="wc ${tod?'wc-today':''}">
      <div class="wc-head" onclick="clickDay('${key}')">
        <div class="wc-name">${DIA_CORTO[i]}</div>
        <div class="wc-num">${day.getDate()}</div>
      </div>
      <div class="act-list">${actsHtml}</div>
      <button class="wk-add-btn" onclick="openActModal('${key}')">+ agregar</button>
    </div>`;
  }
  return html+'</div></div></div>';
}

// ═══════════════════════════════════════════
//  RENDER DÍA
// ═══════════════════════════════════════════
function renderDay() {
  const key=dk(st.date), aa=sortedActs(st.date);
  const total=aa.length;
  const doneCount=aa.filter(a=>a.done).length;
  const skipCount=aa.filter(a=>a.skipped).length;
  const pendingCount=total-doneCount-skipCount;
  const pct=total>0?Math.round(doneCount/total*100):0;
  const skipPct=total>0?Math.round(skipCount/total*100):0;
  const tod=isToday(st.date);
  // Etapas asignadas a este día
  const objs=getObjs(st.date);
  const dayStages=[];
  objs.forEach(obj=>{ (obj.stages||[]).forEach(s=>{ if(s.dayKey===key) dayStages.push({...s,objText:obj.text,objId:obj.id}); }); });
  const stageCards=dayStages.length>0?`<div style="margin-bottom:4px">${dayStages.map(s=>`
    <div class="day-stage-card ${s.done?'dst-done':''}">
      <div class="dst-label">&#127919; PRIORIDAD DEL MES</div>
      <div class="dst-obj">&#128204; ${esc(s.objText)}</div>
      <div class="dst-text">${esc(s.text)}</div>
      ${s.timeStart?`<div style="font-size:.72rem;color:#d97706;margin-top:5px;font-weight:600">&#9201; ${s.timeStart}</div>`:''}
    </div>`).join('')}</div>`:'';
  let statsLine='';
  if(total>0){
    const parts=[`${doneCount} cumplidas`];
    if(skipCount>0) parts.push(`${skipCount} no cumplidas`);
    if(pendingCount>0) parts.push(`${pendingCount} pendientes`);
    statsLine=`<div class="prog-label">${parts.join(' &middot; ')} (${pct}% logrado)</div>
      <div class="prog-bar" style="display:flex">
        <div class="prog-fill" style="width:${pct}%"></div>
        <div style="width:${skipPct}%;height:100%;background:#ef4444;transition:width .4s"></div>
      </div>`;
  }
  let html=`<div class="container"><div class="day-wrap">
    <div class="day-header-card">
      <div class="dv-title">${DIA_LARGO[diIdx(st.date)]}, ${st.date.getDate()} de ${MESES[st.date.getMonth()]}</div>
      <div class="dv-sub">${tod?'— hoy':st.date.getFullYear()}</div>
      ${statsLine}
    </div>
    ${stageCards}`;
  if (total===0) {
    html+=`<div class="empty"><div class="empty-icon">&#128203;</div><div class="empty-text">No hay actividades — ¡agregá una!</div></div>`;
  } else {
    aa.forEach(a=>{
      const cat=a.category||'normal', emoji=CATS[cat]?.emoji||'';
      const subacts=a.subacts||[];
      const subHtml=subacts.length>0?`<div class="subacts">${subacts.map(s=>`
        <div class="subact-item">
          <div class="subact-check ${s.done?'ck':''}" onclick="toggleSub('${key}','${a.id}','${s.id}')">${s.done?'✓':''}</div>
          <span class="subact-text ${s.done?'done':''}">${esc(s.text)}</span>
        </div>`).join('')}</div>`:'';
      const cardCls=a.done?'d-done':a.skipped?'d-skip':'';
      const checkEl=a.skipped
        ?`<div class="d-skip-x" onclick="unSkipAct('${key}','${a.id}')" title="Quitar incumplimiento">&#10007;</div>`
        :`<div class="d-check ${a.done?'ck':''}" onclick="toggle('${key}','${a.id}')">${a.done?'&#10003;':''}</div>`;
      const skipBtn=a.skipped
        ?`<button class="dac-btn unskip-btn" onclick="unSkipAct('${key}','${a.id}')" title="Quitar incumplimiento">&#8629;</button>`
        :a.done?''
        :`<button class="dac-btn skip-btn" onclick="openSkipModal('${key}','${a.id}')" title="No la cumplí">&#10007;</button>`;
      const skipReasonEl=a.skipped
        ?(a.skipReason?`<div class="skip-reason-card">&#10060; ${esc(a.skipReason)}</div>`
        :`<div class="skip-reason-card" style="color:#9ca3af;font-style:normal">No cumplida &mdash; sin motivo registrado</div>`):'';
      html+=`<div class="day-act-card ${cardCls}">
        <div class="dac-top">
          ${checkEl}
          <div class="dac-body">
            <span class="d-text">${emoji?emoji+' ':''}${esc(a.text)}</span>
            ${a.timeStart?`<div class="d-times">&#9201; ${a.timeStart}${a.timeEnd?' – '+a.timeEnd:''}</div>`:''}
          </div>
          <div class="dac-btns">
            ${skipBtn}
            <button class="dac-btn" onclick="openActModal('${key}','${a.id}')" title="Editar">&#9998;</button>
            <button class="dac-btn del" onclick="del('${key}','${a.id}')" title="Eliminar">&#128465;</button>
          </div>
        </div>
        ${a.notes?`<div class="dac-notes">&#128203; ${esc(a.notes)}</div>`:''}
        ${skipReasonEl}
        ${subHtml}
      </div>`;
    });
  }
  html+=`<button class="day-add-btn" onclick="openActModal('${key}')">+ Agregar actividad</button></div></div>`;
  return html;
}

// ═══════════════════════════════════════════

        <button class="obj-del" onclick="doDelObj('${ym}','${obj.id}')">✕</button>
      </div>
      ${stages.map(s=>`
        <div class="stage-item ${s.done?'s-done':''}">
          <div class="stage-check ${s.done?'ck':''}" onclick="doToggleStage('${ym}','${obj.id}','${s.id}')">${s.done?'✓':''}</div>
          <div class="stage-body">
            <div class="stage-text">${esc(s.text)}</div>
            ${s.week?`<div class="stage-week">Semana ${s.week}</div>`:''}
          </div>
          <button class="stage-del" onclick="doDelStage('${ym}','${obj.id}','${s.id}')">✕</button>

function renderEvaluation() {
  const stats=evalStats(), key=evalKey(), notes=getEvalNotes(key), p=st.evalPeriod, d=st.date;
  let lbl='';
  if (p==='day') lbl=`${DIA_LARGO[diIdx(d)]}, ${d.getDate()} de ${MESES[d.getMonth()]}`;
  else if (p==='week') { const mon=monOfWeek(d); lbl=`Semana del ${mon.getDate()} de ${MESES[mon.getMonth()]}`; }
  else lbl=`${MESES[d.getMonth()]} ${d.getFullYear()}`;
  const dp=stats.total>0?Math.round(stats.done/stats.total*100):0;
  const mp=stats.total>0?Math.round(stats.missed/stats.total*100):0;
  return `<div class="container"><div class="eval-wrap">
    <div class="eval-period-tabs">
      <button class="eval-tab ${p==='day'?'active':''}"   onclick="setEvalPeriod('day')">D&iacute;a</button>
      <button class="eval-tab ${p==='week'?'active':''}"  onclick="setEvalPeriod('week')">Semana</button>
      <button class="eval-tab ${p==='month'?'active':''}" onclick="setEvalPeriod('month')">Mes</button>
    </div>
    <div class="eval-card">
      <h3>${lbl}</h3>
      ${stats.total===0
        ?'<div class="empty"><div class="empty-text">No hay actividades para evaluar en este período</div></div>'
        :`<div class="stat-row">
          <div class="stat-box planned"><div class="stat-num">${stats.total}</div><div class="stat-label">Planificadas</div></div>
          <div class="stat-box done-box"><div class="stat-num">${stats.done}</div><div class="stat-label">Logradas</div></div>
          <div class="stat-box missed"><div class="stat-num">${stats.missed}</div><div class="stat-label">No cumplidas</div></div>
          <div class="stat-box pending-box"><div class="stat-num">${stats.pending}</div><div class="stat-label">Pendientes</div></div>
        </div>
        <div class="eval-bar" style="display:flex">
          <div class="eval-bar-done" style="width:${dp}%"></div>
          <div class="eval-bar-miss" style="width:${mp}%"></div>
        </div>`}
      <div class="eval-notes-lbl">¿Qué pasó? ¿Qué mejorarías?</div>
      <textarea class="eval-notes" id="eval-notes-input" placeholder="Escribí tu evaluación...">${notes}</textarea>
      <button class="eval-save" onclick="saveEvalNotes()">Guardar notas</button>
    </div>
  </div></div>`;
}
function setEvalPeriod(p) { st.evalPeriod=p; render(); }
function saveEvalNotes() {
  const notes=document.getElementById('eval-notes-input')?.value||'';
  setEvalNotes(evalKey(),notes);
  const btn=document.querySelector('.eval-save');
  if(btn){ btn.textContent='✓ Guardado'; setTimeout(()=>{ if(btn) btn.textContent='Guardar notas'; },2000); }
}

function openActModal(dateKey, editId=null) {
  ms.dateKey=dateKey; ms.editId=editId; ms.repeatDays=new Set();
  const isEdit=!!editId;
  document.getElementById('modal-title').textContent=isEdit?'Editar actividad':'Nueva actividad';
  document.getElementById('m-repeat-section').style.display=isEdit?'none':'';
  document.getElementById('m-days-wrap').style.display='none';
  document.getElementById('m-repeat').checked=false;
  document.querySelectorAll('.day-pill-m').forEach(p=>p.classList.remove('active'));
  if (isEdit) {
    const act=acts(fromKey(dateKey)).find(a=>a.id===editId)||{};
    ms.cat=act.category||'normal';
    ms.subacts=[...(act.subacts||[])].map(s=>({...s}));
    document.getElementById('m-text').value=act.text||'';
    document.getElementById('m-start').value=act.timeStart||'';
    document.getElementById('m-end').value=act.timeEnd||'';
    document.getElementById('m-notes').value=act.notes||'';
  } else {
    ms.cat='normal'; ms.subacts=[];
    document.getElementById('m-text').value='';
    document.getElementById('m-start').value='';
    document.getElementById('m-end').value='';
    document.getElementById('m-notes').value='';

  updateCatPills();
  renderModalSubacts();
  document.getElementById('act-modal').style.display='flex';
  setTimeout(()=>document.getElementById('m-text')?.focus(),50);
}
function closeActModal() { document.getElementById('act-modal').style.display='none'; }
function setCat(cat) { ms.cat=cat; updateCatPills(); }
function updateCatPills() {
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.toggle('active',p.dataset.cat===ms.cat));
}
function toggleRepeatSection() {
  const cb=document.getElementById('m-repeat');
  document.getElementById('m-days-wrap').style.display=cb.checked?'':'none';
}
function toggleDayPill(day) {
  if(ms.repeatDays.has(day)) ms.repeatDays.delete(day); else ms.repeatDays.add(day);
  document.querySelectorAll('.day-pill-m').forEach(p=>p.classList.toggle('active',ms.repeatDays.has(parseInt(p.dataset.day))));
}
function addSubactToModal() {
  ms.subacts.push({id:uid(),text:'',done:false});
  renderModalSubacts();
  setTimeout(()=>{ const inps=document.querySelectorAll('#m-subacts .subact-inp'); if(inps.length) inps[inps.length-1].focus(); },50);
}
function removeSubactFromModal(idx) { ms.subacts.splice(idx,1); renderModalSubacts(); }
function renderModalSubacts() {
  const c=document.getElementById('m-subacts'); if(!c) return;
  c.innerHTML=ms.subacts.map((s,i)=>`
    <div class="subact-row">
      <input type="text" class="subact-inp" value="${esc(s.text)}" placeholder="Subactividad..."
        oninput="ms.subacts[${i}].text=this.value" onkeydown="if(event.key==='Enter')addSubactToModal()">
      <button class="subact-rm" onclick="removeSubactFromModal(${i})">✕</button>
    </div>`).join('');
}
function saveActModal() {
  const text=document.getElementById('m-text')?.value?.trim();
  if (!text) { document.getElementById('m-text')?.focus(); return; }
  const timeStart=document.getElementById('m-start')?.value||'';
  const timeEnd=document.getElementById('m-end')?.value||'';
  const notes=document.getElementById('m-notes')?.value?.trim()||'';
  const subacts=ms.subacts.filter(s=>s.text.trim()).map(s=>({...s,text:s.text.trim()}));
  const isRepeat=document.getElementById('m-repeat')?.checked;
  const actData={text,timeStart,timeEnd,notes,category:ms.cat,subacts};
  if (ms.editId) {
    const d=fromKey(ms.dateKey);
    setActs(d,acts(d).map(a=>a.id===ms.editId?{...a,...actData}:a));
  } else if (isRepeat&&ms.repeatDays.size>0) {
    addRecurring(ms.dateKey,actData,ms.repeatDays);
  } else {
    addAct(fromKey(ms.dateKey),actData);
  }
  closeActModal();
  render();
}

function assignStageDay(ym, objId, stageId) {
  document.getElementById('assign-popup-overlay')?.remove();

  const existingObjs=getObjs(fromKey(ym+'-01'));
  let existingTime='';
  existingObjs.forEach(o=>{ if(o.id===objId)(o.stages||[]).forEach(s=>{ if(s.id===stageId) existingTime=s.timeStart||''; }); });

  overlay.className='assign-popup-overlay';
  overlay.onclick=e=>{ if(e.target===overlay) overlay.remove(); };
  const days=Array.from({length:7},(_,i)=>{
    const d=addDays(mon,i);
    return `<button class="assign-day-btn" onclick="doAssignDay('${ym}','${objId}','${stageId}','${dk(d)}')">${DIA_CORTO[i]}<br><span style="font-size:.85em;opacity:.7">${d.getDate()}</span></button>`;

    <h3>&#128197; ¿Cuándo trabajás esta etapa?</h3>

    <div style="margin-top:12px">

      <input type="time" id="assign-time-input" value="${existingTime}" style="width:100%;padding:8px 10px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:.88rem;outline:none;font-family:inherit">
    </div>
    <button class="assign-clear-btn" style="width:100%;margin-top:8px" onclick="doAssignDay('${ym}','${objId}','${stageId}','')">Quitar d&iacute;a y horario</button>
    <button class="assign-cancel-btn" onclick="document.getElementById('assign-popup-overlay')?.remove()">Cancelar</button>
  </div>`;
  document.body.appendChild(overlay);
}
function doAssignDay(ym, objId, stageId, dayKey) {

function fmtARS(n) {
  return '$ '+(Math.abs(n)||0).toLocaleString('es-AR',{minimumFractionDigits:0,maximumFractionDigits:2});
}

// ═══════════════════════════════════════════
//  GASTOS — RENDER
// ═══════════════════════════════════════════
function renderGastos() {
  const ym   = ymk(st.date);
  const txs  = getGastosMonth(ym);
  const fijos = getFijos(ym);

  // Totales
  const totalIngresos       = txs.filter(t=>t.type==='ingreso').reduce((s,t)=>s+t.amount,0);
  const totalVariables      = txs.filter(t=>t.type==='gasto').reduce((s,t)=>s+t.amount,0);
  const totalFijosPagados   = fijos.filter(f=>f.pagado).reduce((s,f)=>s+(f.monto||0),0);
  const totalFijosComprometidos = fijos.filter(f=>!f.pagado).reduce((s,f)=>s+(f.monto||0),0);
  const disponible          = totalIngresos - totalFijosPagados - totalVariables;

  // ── Balance card ──────────────────────────
  const balHtml=`<div class="gs-balance-card">
    <div class="gs-balance-label">Disponible real</div>
    <div class="gs-balance-amount${disponible<0?' neg':''}">${disponible>=0?'+':'−'} ${fmtARS(disponible)}</div>
    <div class="gs-row">
      <div class="gs-mini"><div class="gs-mini-label">&#8593; Ingresos</div><div class="gs-mini-amount">+${fmtARS(totalIngresos)}</div></div>
      <div class="gs-mini"><div class="gs-mini-label">&#9679; Fijos pagados</div><div class="gs-mini-amount">−${fmtARS(totalFijosPagados)}</div></div>
      <div class="gs-mini"><div class="gs-mini-label">&#8595; Variables</div><div class="gs-mini-amount">−${fmtARS(totalVariables)}</div></div>
    </div>
  </div>`;

  // ── Comprometido ──────────────────────────
  const committedHtml = totalFijosComprometidos>0 ? `<div class="gs-committed">
    <span class="gs-committed-label">&#9888; Comprometido sin pagar</span>
    <span class="gs-committed-amount">−${fmtARS(totalFijosComprometidos)}</span>
  </div>` : '';

  // ── Gastos Fijos ──────────────────────────
  let fijosRows='';
  if(fijos.length===0) {
    const prev=new Date(st.date.getFullYear(),st.date.getMonth()-1,1);
    const hasPrev=getFijos(ymk(prev)).length>0;
    fijosRows=`<div class="gs-copy-empty">
      <div class="gs-copy-empty-txt">No hay gastos fijos este mes.</div>
      ${hasPrev?`<button class="gs-copy-btn" onclick="copyFijosAndRender('${ym}')">Copiar del mes anterior</button>`:''}
    </div>`;
  } else {
    fijosRows=fijos.map(f=>`<div class="gs-fijo-item${f.pagado?' pagado':''}">
      <div class="gs-fijo-check${f.pagado?' ck':''}" onclick="toggleFijoRender('${ym}','${f.id}')">${f.pagado?'&#10003;':''}</div>
      <div class="gs-fijo-desc">${esc(f.desc)}</div>
      <div class="gs-fijo-monto" onclick="editFijoMonto('${ym}','${f.id}',${f.monto})" title="Tap para editar">${fmtARS(f.monto)}</div>
      <button class="gs-fijo-del" onclick="delFijoRender('${ym}','${f.id}')">&#10005;</button>
    </div>`).join('');
  }
  const fijosHtml=`
    <div class="gs-section-hdr">
      <div class="gs-section-title">Gastos Fijos</div>
      <button class="gs-section-action" onclick="showAddFijo()">+ Agregar</button>
    </div>
    ${fijosRows}
    <div id="gs-add-fijo-form" class="gs-add-fijo-form" style="display:none">
      <input type="text"   class="gs-fijo-inp"        id="gf-desc"  placeholder="Descripción...">
      <input type="number" class="gs-fijo-inp gs-fijo-inp-m" id="gf-monto" placeholder="Monto" min="0" onkeydown="if(event.key==='Enter')saveAddFijo('${ym}')">
      <button class="gs-fijo-ok"         onclick="saveAddFijo('${ym}')">OK</button>
      <button class="gs-fijo-cancel-btn" onclick="document.getElementById('gs-add-fijo-form').style.display='none'">&#10005;</button>
    </div>`;

  // ── Variables — categorías ────────────────
  const catTotals={};
  txs.filter(t=>t.type==='gasto').forEach(t=>{ catTotals[t.category]=(catTotals[t.category]||0)+t.amount; });
  const maxCat=Math.max(1,...Object.values(catTotals));
  const catRows=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([k,v])=>{
    const cat=GASTO_CATS[k]||{emoji:'📦',label:k};
    const w=Math.round(v/maxCat*100);
    return `<div class="gs-cat-bar">
      <div class="gs-cat-emoji">${cat.emoji}</div>
      <div class="gs-cat-info">
        <div class="gs-cat-name">${cat.label}</div>
        <div class="gs-cat-track"><div class="gs-cat-fill" style="width:${w}%"></div></div>
      </div>
      <div class="gs-cat-amount">−${fmtARS(v)}</div>
    </div>`;
  }).join('');
  const catsHtml=catRows?`<div style="background:white;border-radius:14px;padding:10px 16px;box-shadow:0 2px 10px rgba(0,0,0,.05);margin-bottom:10px">${catRows}</div>`:'';

  // ── Variables — movimientos por día ───────
  const byDay={};
  [...txs].sort((a,b)=>b.date.localeCompare(a.date)||(b.createdAt-a.createdAt))
    .forEach(t=>{ if(!byDay[t.date]) byDay[t.date]=[]; byDay[t.date].push(t); });
  let txHtml='';
  if(Object.keys(byDay).length===0){
    txHtml=`<div class="empty"><div class="empty-icon">&#128176;</div><div class="empty-text">No hay movimientos variables.<br>Toc&aacute; + para agregar el primero.</div></div>`;
  } else {
    Object.entries(byDay).forEach(([date,list])=>{
      const d=fromKey(date), isT=dk(new Date())===date;
      const label=isT?'Hoy':`${DIA_CORTO[diIdx(d)]} ${d.getDate()}`;
      txHtml+=`<div class="gs-tx-day">${label} <span style="font-weight:400;text-transform:none">${MESES[d.getMonth()].slice(0,3)}</span></div>`;
      list.forEach(t=>{
        const cat=GASTO_CATS[t.category]||{emoji:'📦',label:t.category};
        const signo=t.type==='ingreso'?'+':'−';
        const cls=t.type==='ingreso'?'ingreso':'gasto';
        const desc=t.description||cat.label;
        txHtml+=`<div class="gs-tx-item">
          <div class="gs-tx-emoji">${cat.emoji}</div>
          <div class="gs-tx-body">
            <div class="gs-tx-desc">${esc(desc)}</div>
            <div class="gs-tx-cat">${cat.label}</div>
          </div>
          <div class="gs-tx-amount ${cls}">${signo}${fmtARS(t.amount)}</div>
          <button class="gs-tx-del" onclick="delGastoConfirm('${t.id}')">&#10005;</button>
        </div>`;
      });
    });
  }

  const variablesHtml=`
    <div class="gs-section-hdr" style="margin-top:22px">
      <div class="gs-section-title">Gastos Variables</div>
    </div>
    ${catsHtml}${txHtml}`;

  return `<div class="container"><div class="gastos-wrap">
    ${balHtml}${committedHtml}${fijosHtml}${variablesHtml}
    <button class="gs-fab" onclick="openGE()">+</button>
  </div></div>`;
}

// ═══════════════════════════════════════════
//  GASTOS — MODAL ESTADO
// ═══════════════════════════════════════════
let gs = { type:'gasto', amount:'', category:'comida', description:'', editId:null };

function openGE(editId) {
  gs.editId = editId||null;
  if (editId) {
    const tx=(st.gastos||[]).find(t=>t.id===editId);
    if (tx) { gs.type=tx.type; gs.amount=String(tx.amount); gs.category=tx.category; gs.description=tx.description||''; }
  } else {
    gs.type='gasto'; gs.amount=''; gs.category='comida'; gs.description='';
  }
  gsUpdateUI();
  document.getElementById('ge-overlay').style.display='flex';
  document.getElementById('ge-desc').value=gs.description;
}
function closeGE() { document.getElementById('ge-overlay').style.display='none'; }

function gsSetType(t) {
  gs.type=t;
  gs.category=t==='gasto'?'comida':'sueldo';
  gsUpdateUI();
}
function gsSetCat(k) {
  gs.category=k;
  document.querySelectorAll('.ge-cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===k));
}
function gsPad(k) {
  if(k==='⌫'||k==='⌫'){ gs.amount=gs.amount.slice(0,-1); }
  else if(k==='.'){
    if(!gs.amount.includes('.')) gs.amount+=(gs.amount===''?'0.':'.');
  } else {
    const parts=gs.amount.split('.');
    if(parts.length===1&&parts[0].replace(/^0+/,'').length<8) {
      if(gs.amount==='0') gs.amount=k; else gs.amount+=k;
    } else if(parts.length===2&&parts[1].length<2) {
      gs.amount+=k;
    }
  }
  const disp=document.getElementById('ge-display');
  if(disp){ disp.textContent=gs.amount||'0'; disp.className='ge-display'+(gs.amount?' has-val':''); }
}
function gsUpdateUI() {
  const isGasto=gs.type==='gasto';
  const gb=document.getElementById('ge-btn-gasto'), ib=document.getElementById('ge-btn-ingreso');
  if(gb) gb.className='ge-type-btn'+(isGasto?' active-gasto':'');
  if(ib) ib.className='ge-type-btn'+(!isGasto?' active-ingreso':'');
  const disp=document.getElementById('ge-display');
  if(disp){ disp.textContent=gs.amount||'0'; disp.className='ge-display'+(gs.amount?' has-val':''); }
  const cats=isGasto?GASTO_CAT_KEYS:INGRESO_CAT_KEYS;
  const container=document.getElementById('ge-cats');
  if(container) container.innerHTML=cats.map(k=>{
    const c=GASTO_CATS[k];
    return `<button class="ge-cat-btn ${gs.category===k?'active':''}" data-cat="${k}" onclick="gsSetCat('${k}')">
      <span class="ge-em">${c.emoji}</span>
      <span class="ge-lb">${c.label}</span>
    </button>`;
  }).join('');
}
function saveGE() {
  const amt=parseFloat(gs.amount);
  if(!amt||amt<=0){
    const d=document.getElementById('ge-display');
    if(d){ const orig=d.className; d.style.color='#ef4444'; setTimeout(()=>{ d.style.color=''; },500); }
    return;
  }
  const desc=document.getElementById('ge-desc')?.value?.trim()||'';
  if(gs.editId) {
    const idx=(st.gastos||[]).findIndex(t=>t.id===gs.editId);
    if(idx>=0) st.gastos[idx]={...st.gastos[idx], type:gs.type, amount:amt, category:gs.category, description:desc};
    save();
  } else {
    addGasto({ type:gs.type, amount:amt, category:gs.category, description:desc, date:dk(new Date()) });
  }
  closeGE();
  if(st.view==='gastos') render();
}

// ═══════════════════════════════════════════
//  INICIO
// ═══════════════════════════════════════════
loadLocal();
render();
if (firebaseActivo) loadFirestore(()=>render());
else setSync('local');
</script>
